<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                template="#{layoutView.template}"
>

    <ui:define name="title">
        Panel
    </ui:define>

    <ui:define name="description">
        <p:link value="Panel"
                href="http://www.primefaces.org/showcase/ui/panel/panel.xhtml"/> is a grouping component with a header, content and footer.
    </ui:define>

    <ui:define name="body">
        <h:form>
            <p:growl id="msgs" showDetail="true"/>

            <p:panel id="basic" header="Basic" footer="Movie Details" styleClass="mb-4">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather1.jpg"/>
                    <h:outputText
                        value="The story begins as Don Vito Corleone..."/>
                </h:panelGrid>
            </p:panel>


            <p:panel header="No border" footer="Movie Details" styleClass="no-border mb-4">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather1.jpg"/>
                    <h:outputText
                        value="The story begins as Don Vito Corleone..."/>
                </h:panelGrid>
            </p:panel>

            <p:panel header="Card" footer="Movie Details"  styleClass="card mb-4">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather1.jpg"/>
                    <h:outputText
                        value="The story begins as Don Vito Corleone..."/>
                </h:panelGrid>
            </p:panel>  

            <p:panel id="box-colors-panel" header="Box Colors - #{panelView.selectedColor}" styleClass="mb-4 #{panelView.selectedColor}">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather1.jpg"/>
                    <h:outputText
                        value="The story begins as Don Vito Corleone..."/>
                </h:panelGrid>
                <f:facet name="footer">
                    <div class="row g-3">
                        <div class="col-12">
                            <p:outputLabel value="Choice box colors" for="box-colors"/>
                        </div>

                        <div class="col-12">
                            <p:selectOneRadio id="box-colors" value="#{panelView.selectedColor}">
                                <f:selectItems value="#{panelView.boxColors}" var="color" itemLabel="#{color}" itemValue="#{color}"/>
                                <p:ajax update="box-colors-panel"/>
                            </p:selectOneRadio>
                        </div>
                    </div>
                </f:facet>
            </p:panel>
            <p:panel id="toggleable" header="Toggleable" toggleable="true" closable="true" toggleSpeed="500"
                     closeSpeed="500" widgetVar="panel" styleClass="mb-4">

                <p:ajax event="close" listener="#{panelView.onClose}" update="msgs" ignoreAutoUpdate="true"/>
                <p:ajax event="toggle" listener="#{panelView.onToggle}" update="msgs" ignoreAutoUpdate="true"/>

                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather2.jpg"/>
                    <h:outputText value="Francis Ford Coppola's legendary continuation..."/>
                </h:panelGrid>

                <f:facet name="options">
                    <p:menu>
                        <p:submenu label="Settings">
                            <p:menuitem value="Toggle" url="#" icon="ui-icon-newwin" onclick="PF('panel').toggle()"/>
                            <p:menuitem value="Remove" url="#" icon="ui-icon-close" onclick="PF('panel').close()"/>
                        </p:submenu>
                    </p:menu>
                </f:facet>
            </p:panel>

            <p:panel id="toggleable-solid" header="Toggleable solid" toggleable="true" closable="true" toggleSpeed="500"
                     closeSpeed="500" widgetVar="panel-solid" styleClass="box-danger box-solid mb-4">

                <p:ajax event="close" listener="#{panelView.onClose}" update="msgs" ignoreAutoUpdate="true"/>
                <p:ajax event="toggle" listener="#{panelView.onToggle}" update="msgs" ignoreAutoUpdate="true"/>

                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather2.jpg"/>
                    <h:outputText value="Francis Ford Coppola's legendary continuation..."/>
                </h:panelGrid>

                <f:facet name="options">
                    <p:menu>
                        <p:submenu label="Settings">
                            <p:menuitem value="Toggle" url="#" icon="ui-icon-newwin" onclick="PF('panel-solid').toggle()"/>
                            <p:menuitem value="Remove" url="#" icon="ui-icon-close" onclick="PF('panel-solid').close()"/>
                        </p:submenu>
                    </p:menu>
                </f:facet>
            </p:panel>

            <p:panel id="custom" header="Custom Actions" styleClass="mb-4">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather3.jpg"/>
                    <h:outputText value="After a break of more than 15 years..."/>
                </h:panelGrid>

                <f:facet name="actions">
                    <h:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"><h:outputText
                            styleClass="ui-icon ui-icon-help"/></h:commandLink>
                    <h:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"><h:outputText
                            styleClass="ui-icon ui-icon-star"/></h:commandLink>
                </f:facet>
            </p:panel>

            <p:panel id="horizontal" header="Horizontal Toggle" toggleable="true" toggleOrientation="horizontal" styleClass="mb-4">
                <h:panelGrid columns="2" cellpadding="10">
                    <p:graphicImage name="images/godfather1.jpg"/>
                    <h:outputText
                        value="The story begins as Don Vito Corleone..."/>
                </h:panelGrid>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
