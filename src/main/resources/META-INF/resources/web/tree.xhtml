<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                template="#{layoutView.template}"
>

  <ui:define name="title">
    Tree
  </ui:define>

  <ui:define name="description">
    This page shows the shared pf-adm styling for PrimeFaces trees, including filters, togglers, selectable nodes, checkbox selection, and semantic box variants.
  </ui:define>

  <ui:define name="body">
    <h:form id="tree-form">
      <div class="row g-4">
        <div class="col-12 col-xl-6">
          <p:panel header="Single Selection" styleClass="card no-border h-100 box-primary box-solid">
            <p:tree value="#{treeView.root}" var="node" selectionMode="single"
                    selection="#{treeView.selectedNode}" filterBy="#{node}"
                    filterMode="lenient" styleClass="box-primary">
              <p:treeNode>
                <h:outputText value="#{node}"/>
              </p:treeNode>
            </p:tree>
          </p:panel>
        </div>

        <div class="col-12 col-xl-6">
          <p:panel header="Checkbox Selection" styleClass="card no-border h-100 box-success box-solid">
            <p:tree value="#{treeView.root}" var="node" selectionMode="checkbox"
                    selection="#{treeView.selectedNodes}" styleClass="box-success">
              <p:treeNode>
                <h:outputText value="#{node}"/>
              </p:treeNode>
            </p:tree>
          </p:panel>
        </div>

        <div class="col-12">
          <p:panel header="Horizontal Tree" styleClass="card no-border box-info box-solid">
            <p:tree value="#{treeView.root}" var="node" orientation="horizontal"
                    selectionMode="single" selection="#{treeView.selectedNode}" styleClass="box-info">
              <p:treeNode>
                <h:outputText value="#{node}"/>
              </p:treeNode>
            </p:tree>
          </p:panel>
        </div>

        <div class="col-12">
          <p:panel header="Current Values" styleClass="card no-border">
            <h:panelGrid columns="2" cellpadding="8">
              <h:outputText value="Single selection"/>
              <h:outputText value="#{treeView.selectedNode != null ? treeView.selectedNode.data : 'None'}"/>

              <h:outputText value="Checkbox selection count"/>
              <h:outputText value="#{treeView.selectedNodes != null ? treeView.selectedNodes.length : 0}"/>
            </h:panelGrid>
          </p:panel>
        </div>
      </div>
    </h:form>
  </ui:define>

</ui:composition>
