<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui"
                template="#{layoutView.template}"
>
  <ui:define name="title">
    DataView
  </ui:define>

  <ui:define name="description">
    This page shows PrimeFaces DataView with pf-adm card/list styling and a semantic box variant.
  </ui:define>

  <ui:define name="body">
    <div class="card box-primary box-solid product">
      <h:form id="form">
        <p:growl id="messages" showDetail="true"/>
        <p:dataView var="product" value="#{dataView.products}" styleClass="box-primary"
                    rows="12" paginator="true"
                    rowsPerPageTemplate="6,12,16"
                    paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                    currentPageReportTemplate="records {startRecord} - {endRecord} of {totalRecords} (page {currentPage} / {totalPages})"
                    gridIcon="pi pi-th-large" listIcon="pi pi-bars">

          <p:dataViewGridItem>
            <div class="product-grid-item card border-1">
              <div class="product-grid-item-top">
                <div>
                  <i class="pi pi-tag product-category-icon"/>
                  <span class="product-category">#{product.category}</span>
                </div>
                <span
                    class="product-badge status-#{product.inventoryStatus.name().toLowerCase()}">#{product.inventoryStatus.text}</span>
              </div>
              <div class="product-grid-item-content">
                <p:graphicImage name="product/#{product.image}" library="images"/>
                <div class="product-name">#{product.name}</div>
                <div class="product-description">#{product.description}</div>
                <p:rating readonly="true" value="#{product.rating}"/>
              </div>
              <div class="product-grid-item-bottom">
                <h:outputText value="#{product.price}" styleClass="product-price">
                  <f:convertNumber currencySymbol="$" type="currency"/>
                </h:outputText>
                <p:commandButton value="Add To Cart"
                                 icon="pi pi-shopping-cart"
                                 actionListener="#{dataView.addToCart(product)}"
                                 update="messages"
                                 disabled="#{product.inventoryStatus == 'OUTOFSTOCK'}">
                </p:commandButton>
              </div>
            </div>
          </p:dataViewGridItem>

          <p:dataViewListItem>
            <div class="product-list-item">
              <p:graphicImage name="product/#{product.image}" library="images"/>
              <div class="product-list-detail">
                <div class="product-name">#{product.name}</div>
                <div class="product-description">#{product.description}</div>
                <p:rating readonly="true" value="#{product.rating}"/>
                <i class="pi pi-tag product-category-icon"/><span
                  class="product-category">#{product.category}</span>
              </div>
              <div class="product-list-action">
                <h:outputText value="#{product.price}" styleClass="product-price">
                  <f:convertNumber currencySymbol="$" type="currency"/>
                </h:outputText>
                <p:commandButton
                                 value="Add To Cart"
                                 icon="pi pi-shopping-cart"
                                 actionListener="#{dataView.addToCart(product)}"
                                 update="messages"
                                 disabled="#{product.inventoryStatus == 'OUTOFSTOCK'}">
                </p:commandButton>
                <span
                    class="product-badge status-#{product.inventoryStatus.name().toLowerCase()}">#{product.inventoryStatus.text}</span>
              </div>
            </div>
          </p:dataViewListItem>
        </p:dataView>
      </h:form>
    </div>
  </ui:define>
</ui:composition>
